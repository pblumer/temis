name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# `npm ci` would otherwise auto-download Playwright browsers in every Node job;
# the e2e job installs Chromium explicitly via `npx playwright install`.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0

      - name: Verify
        run: make verify

      - name: Coverage gate
        run: make cover

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Scan with the latest stable Go, not the go.mod minimum: stdlib CVEs are
      # remediated by toolchain updates, so the scan should track the newest
      # patched stdlib rather than the (necessarily older) minimum we compile
      # against. This keeps the gate green without chasing patch versions in
      # go.mod on every new stdlib advisory.
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Smoke-build the release image on every PR so a Dockerfile break is caught
      # here, not only when a release tag is pushed (audit WP-137).
      - name: Build container image
        run: docker build -t temisd:ci .

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: web

      - name: Type-check
        run: npm run typecheck
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Verify committed dist is up to date
        run: git diff --exit-code -- dist
        working-directory: web

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (wasm + dist)
        run: make web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run end-to-end tests
        run: npm run test:e2e
        working-directory: web

  tck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      # Fetch the pinned official DMN TCK corpus and run the conformance gate,
      # which fails if the pass rate drops below the ratchet floor (WP-41).
      - name: Official DMN TCK conformance
        run: make tck-conformance

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install codegen plugins
        run: make proto-tools

      - name: Verify committed gRPC code is up to date
        run: PATH="$(go env GOPATH)/bin:$PATH" make proto-check
