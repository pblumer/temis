name: Release

# Cut a release by pushing a SemVer tag (WP-46):
#   git tag v1.2.3 && git push origin v1.2.3
# This builds versioned binaries for every target, publishes a GitHub Release
# with notes from the matching CHANGELOG.md section, and pushes a container
# image for temisd to GHCR.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ldflags="-s -w -X github.com/pblumer/temis/internal/version.Version=${VERSION}"
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for cmd in temisd temis-mcp temis-clio-worker; do
            for t in $targets; do
              os=${t%/*}; arch=${t#*/}
              out="${cmd}_${VERSION}_${os}_${arch}"
              ext=""; [ "$os" = "windows" ] && ext=".exe"
              echo "building $out$ext"
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags "$ldflags" -o "build/${cmd}${ext}" "./cmd/${cmd}"
              if [ "$os" = "windows" ]; then
                (cd build && zip -q "../dist/${out}.zip" "${cmd}${ext}")
              else
                tar -C build -czf "dist/${out}.tar.gz" "${cmd}${ext}"
              fi
              rm -f "build/${cmd}${ext}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -l dist

      - name: Extract release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          # Pull the body of the [x.y.z] section out of CHANGELOG.md; fall back
          # to a generic note if the section is absent.
          notes=$(awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$(printf "%s" "$notes" | tr -d '[:space:]')" ]; then
            notes="Release ${VERSION}. See CHANGELOG.md."
          fi
          {
            echo "NOTES<<__EOF__"
            echo "$notes"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prerelease=""
          case "$VERSION" in *-*) prerelease="--prerelease";; esac
          gh release create "$VERSION" dist/* \
            --title "$VERSION" \
            --notes "$NOTES" \
            $prerelease

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push temisd image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository }}/temisd:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/temisd:latest
