openapi: 3.0.3
info:
  title: Temis DMN Engine API
  version: "1.0-experimental"
  description: >
    HTTP interface to the Temis DMN 1.5 decision engine. Upload a DMN XML model,
    then evaluate one of its decisions against a JSON input context. A stateless
    endpoint compiles and evaluates in a single request. The surface is
    experimental until the v1 stabilisation (roadmap WP-43).


    When the server is started with a token (`temisd -token …` or
    `TEMIS_API_TOKEN`), the `/v1` endpoints require an
    `Authorization: Bearer <token>` header — click **Authorize** and paste the
    token to try them here. When no token is configured the API is open and the
    header is ignored.
servers:
  - url: /
# Bearer auth is optional: when the server runs without a token the empty
# requirement ({}) makes every endpoint callable; when a token is set, callers
# present it via the bearerAuth scheme. Swagger UI's "Authorize" button binds to
# bearerAuth.
security:
  - bearerAuth: []
  - {}
paths:
  /v1/models:
    post:
      summary: Compile and cache a DMN model
      description: >
        The request body is the raw DMN XML document. The response carries the
        content-addressed model id, the model index and any compile diagnostics.
        Re-uploading the same document returns the same id.
      requestBody:
        required: true
        content:
          application/xml:
            schema: { type: string }
      responses:
        "201":
          description: Model compiled and cached
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelResponse" }
        "400":
          description: Empty body or malformed XML
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List cached models
      description: >
        Returns a summary (id, decisions, inputs) of every model currently held
        in the in-memory cache. This endpoint can be disabled at startup
        (`temisd -list-models=false`) to keep the cached decisions private; when
        disabled it responds 404 as if it did not exist.
      responses:
        "200":
          description: The cached models
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Model listing is disabled
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}:
    get:
      summary: Get a cached model's index
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Model index
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/xml:
    get:
      summary: Get a cached model's raw DMN XML
      description: Returns the DMN document exactly as uploaded, so a client can reopen it in an editor.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The model's DMN XML
          content:
            application/xml:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/evaluate:
    post:
      summary: Evaluate a decision of a cached model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateModelRequest" }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "400":
          description: Invalid request body or missing decision
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown model or decision
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Evaluation failed (e.g. UNIQUE table with multiple matches)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/evaluate-graph:
    post:
      summary: Evaluate the whole model and return every decision's result
      description: >-
        Fills the model's leaf inputs once and evaluates every executable
        decision, returning each one's value (and trace with explain) — the whole
        decision requirements graph computed from a single set of inputs. With
        strict, inputs are validated against the model's whole-graph schema, so a
        transitively-reached input is accepted while an unknown one is reported.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateGraphRequest" }
      responses:
        "200":
          description: Per-decision results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateGraphResponse" }
        "400":
          description: Invalid request body
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown model
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Input does not satisfy the model's schema, or evaluation failed
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  # --- Modeler endpoints (ADR-0016) ---
  # These back the server's built-in DMN modeler (served at /). They read a
  # model's structure and per-decision logic, and edit it: every mutating call
  # recompiles the patched DMN XML and returns the saved model (201,
  # ModelResponse) under its new content-addressed id, so the client switches to
  # the persisted revision. They live on the same token-gated /v1 surface as the
  # core API.
  /v1/models/{id}/graph:
    get:
      summary: Get a model's decision requirements graph
      description: Nodes and requirement edges, so a client can draw the DRG without parsing DMN XML.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The decision requirements graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Graph" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Reconcile a model to a desired graph
      description: >
        Persists added/removed/moved/renamed/retyped nodes and edges, then
        recompiles. Surviving decisions keep their logic; new decisions are
        created undecided.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GraphEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/types:
    get:
      summary: List a model's named item definitions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The model's item definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items: { $ref: "#/components/schemas/ItemType" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Create or update a simple item definition
      description: Recompiles and returns the saved model. A structured (component) type or empty name is a 400.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemType" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/types/{name}:
    delete:
      summary: Remove a named item definition
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No model with that id, or no type with that name
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/decisions/{decision}/table:
    get:
      summary: Get a decision's decision-table view
      description: Hit policy, columns and rule rows. 404 when the decision has no decision-table logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The decision table
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TableView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Rewrite a decision's decision-table rules
      description: Columns and hit policy are preserved unless replaceColumns is set. Recompiles and returns the saved model.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TableEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-table:
    post:
      summary: Give an undecided decision a fresh decision table
      description: Columns are derived from the decision's requirements. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/literal:
    get:
      summary: Get a decision's literal-expression view
      description: 404 when the decision's logic is not a literal expression.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The literal expression
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiteralView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's literal-expression logic
      description: Creates or replaces the decision's literal FEEL expression. Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveLiteralRequest" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/context:
    get:
      summary: Get a decision's boxed-context view
      description: 404 when the decision's logic is not a boxed context.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContextView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-context logic
      description: Creates or replaces the decision's boxed context from literal-valued entries. Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContextEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/bkm/{bkm}:
    get:
      summary: Get a business knowledge model's encapsulated-logic view
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: bkm, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The BKM's function (parameters + body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BKMView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a business knowledge model's function
      description: Sets the BKM's parameters and literal body, recompiles and returns the saved model.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: bkm, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BKMFunctionEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/save:
    post:
      summary: Apply modeler edits (positions, names, types) to a model
      description: >
        Patches the cached model's XML with per-node edits, recompiles and
        returns the saved model. All decision logic and the untouched DMNDI are
        preserved.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveModelRequest" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/evaluate:
    post:
      summary: Stateless compile-and-evaluate in one request
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateStatelessRequest" }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "400":
          description: Missing xml/decision or malformed input
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /docs:
    get:
      summary: Interactive Swagger UI
      description: Browser page for trying the API; loads the spec from /openapi.yaml.
      security: []
      responses:
        "200": { description: HTML page }
  /openapi.yaml:
    get:
      summary: This OpenAPI document
      security: []
      responses:
        "200": { description: OpenAPI 3 document (YAML) }
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200": { description: OK }
  /readyz:
    get:
      summary: Readiness probe
      responses:
        "200": { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Opaque token configured via `temisd -token` / `TEMIS_API_TOKEN`. Sent as
        `Authorization: Bearer <token>`. Only enforced when the server is started
        with a token.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token (only when the server requires one)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ModelNotFound:
      description: No model with that id
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    BadModelEdit:
      description: Invalid request body, or the edit could not be applied
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ModelSaved:
      description: >
        Edit applied: the patched model was recompiled and cached under a new
        content-addressed id. The body is the saved model's index (with any
        compile diagnostics), so the client can switch to the persisted revision.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ModelResponse" }
  schemas:
    ModelListResponse:
      type: object
      properties:
        models:
          type: array
          items: { $ref: "#/components/schemas/ModelSummary" }
        count: { type: integer }
    ModelSummary:
      type: object
      properties:
        modelId: { type: string, example: "sha256:..." }
        name: { type: string, description: The DMN definitions' name, if any. }
        decisions:
          type: array
          items: { type: string }
        inputs:
          type: array
          items: { type: string }
        seq:
          type: integer
          description: Creation order (higher = newer), so same-named revisions can be shown newest-first as a history.
    ModelResponse:
      type: object
      properties:
        modelId: { type: string, example: "sha256:..." }
        name: { type: string, description: The DMN definitions' name, if any. }
        decisions:
          type: array
          items: { type: string }
        inputs:
          type: array
          items: { type: string }
        schema:
          type: object
          description: Per-decision typed input schema (decision name → input fields).
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/InputField" }
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
    InputField:
      type: object
      properties:
        name: { type: string }
        type: { type: string, description: "Canonical FEEL type, or empty if undeclared." }
        required: { type: boolean }
        constraint: { type: string, description: "Allowed-values text (a FEEL unary-test list), if any." }
        values:
          type: array
          items: { type: string }
          description: "Discrete values to offer for this input — from a declared enumeration and/or the literals used in decision-table cells."
        valuesClosed:
          type: boolean
          description: "True when values is the exhaustive allowed set (a closed dropdown); false when they are suggestions and other values are accepted."
    EvaluateModelRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string }
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
          description: When true, the response also carries a decision trace.
        strict:
          type: boolean
          description: When true, validate input against the typed schema; 422 INVALID_INPUT on violation.
    EvaluateStatelessRequest:
      type: object
      required: [xml, decision]
      properties:
        xml: { type: string }
        decision: { type: string }
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
          description: When true, the response also carries a decision trace.
        strict:
          type: boolean
          description: When true, validate input against the typed schema; 422 INVALID_INPUT on violation.
    EvaluateResponse:
      type: object
      properties:
        outputs:
          type: object
          additionalProperties: true
        decisions:
          type: object
          additionalProperties: true
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
        trace:
          $ref: "#/components/schemas/Trace"
    EvaluateGraphRequest:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
          description: The model's leaf inputs, filled once for the whole graph.
        explain:
          type: boolean
          description: When true, each decision in the response carries its trace.
        strict:
          type: boolean
          description: When true, validate input against the model's whole-graph schema; 422 INVALID_INPUT on violation.
    EvaluateGraphResponse:
      type: object
      properties:
        values:
          type: object
          additionalProperties: true
          description: Each decision's evaluated value, keyed by decision name.
        traces:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Trace" }
          description: Each decision's trace (with explain), keyed by name.
        errors:
          type: object
          additionalProperties: { type: string }
          description: Message for each decision that failed to evaluate, keyed by name.
        inputSchema:
          type: array
          items: { $ref: "#/components/schemas/InputField" }
          description: The leaf inputs the whole graph consumes.
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
    Trace:
      type: object
      description: >
        Structured explanation of the evaluation, present only when the request
        set explain=true. Derived from the actual evaluation (ADR-0013/WP-51).
      properties:
        tables:
          type: array
          items: { $ref: "#/components/schemas/TableTrace" }
    TableTrace:
      type: object
      properties:
        hitPolicy: { type: string, description: "U/A/F/R/C" }
        aggregation: { type: string, description: "SUM/MIN/MAX/COUNT or empty" }
        matched:
          type: array
          items: { type: integer }
          description: 0-based indices of the rules that matched.
        inputs:
          type: array
          items:
            type: object
            properties:
              expression: { type: string }
              value: {}
        rules:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              id: { type: string }
              matched: { type: boolean }
              outputs:
                type: array
                items: {}
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    input: { type: string }
                    entry: { type: string }
                    matched: { type: boolean }
    Diagnostic:
      type: object
      properties:
        severity: { type: string, enum: [error, warning, info] }
        code: { type: string }
        message: { type: string }
        decisionId: { type: string }
        line: { type: integer }
        col: { type: integer }
    Problem:
      description: RFC-7807 problem detail with a stable engine-specific code.
      type: object
      properties:
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        code: { type: string }
        problems:
          type: array
          description: Structured input-validation failures (code INVALID_INPUT).
          items: { $ref: "#/components/schemas/InputProblem" }
    InputProblem:
      type: object
      properties:
        input: { type: string }
        code: { type: string, enum: [TYPE_MISMATCH, UNKNOWN_INPUT, MISSING_INPUT] }
        message: { type: string }
        expected: { type: string }
        got: { type: string }
    # --- Modeler schemas (ADR-0016) ---
    Graph:
      type: object
      description: A model's decision requirements graph — nodes and requirement edges.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphEdge" }
    GraphNode:
      type: object
      properties:
        id: { type: string }
        type: { type: string, description: "Node kind: decision, inputData, businessKnowledgeModel, decisionService, knowledgeSource." }
        name: { type: string }
        dataType: { type: string, description: "Resolved FEEL type (InputData type or a decision's output type); empty if unknown." }
        varName: { type: string, description: "A decision's output-variable name (how its result is referenced downstream)." }
        hasTable: { type: boolean, description: "Decision whose logic is a decision table." }
        hasLiteral: { type: boolean, description: "Decision whose logic is a literal FEEL expression." }
        hasContext: { type: boolean, description: "Decision whose logic is a boxed context." }
        hasLogic: { type: boolean, description: "Decision that has any executable logic (table, literal or other boxed expression)." }
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
    GraphEdge:
      type: object
      properties:
        type: { type: string, description: "Edge kind, e.g. informationRequirement, knowledgeRequirement, authorityRequirement." }
        source: { type: string }
        target: { type: string }
    GraphEdit:
      type: object
      description: Desired decision requirements graph the model is reconciled to.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphNodeEdit" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphEdgeEdit" }
    GraphNodeEdit:
      type: object
      required: [id, type, name]
      properties:
        id: { type: string }
        type: { type: string }
        name: { type: string }
        dataType: { type: string }
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
    GraphEdgeEdit:
      type: object
      required: [type, source, target]
      properties:
        type: { type: string }
        source: { type: string }
        target: { type: string }
    ItemType:
      type: object
      description: A named item definition (a simple, non-structured FEEL type).
      required: [name]
      properties:
        name: { type: string }
        typeRef: { type: string, description: "Base FEEL type, e.g. string, number, boolean." }
        isCollection: { type: boolean }
        allowedValues: { type: string, description: "A FEEL unary-test list constraining the values." }
        structured: { type: boolean, description: "Read-only marker on GET; a structured (component) type cannot be saved via this endpoint." }
    TableView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        hitPolicy: { type: string, description: "U/A/P/F/R/C/O" }
        aggregation: { type: string, description: "SUM/MIN/MAX/COUNT or empty" }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/TableInput" }
        outputs:
          type: array
          items: { $ref: "#/components/schemas/TableOutput" }
        rules:
          type: array
          items: { $ref: "#/components/schemas/TableRule" }
    TableInput:
      type: object
      properties:
        label: { type: string }
        expression: { type: string }
        typeRef: { type: string }
    TableOutput:
      type: object
      properties:
        name: { type: string }
        label: { type: string }
        typeRef: { type: string }
    TableRule:
      type: object
      properties:
        inputEntries:
          type: array
          items: { type: string }
          description: One FEEL unary-test per input column.
        outputEntries:
          type: array
          items: { type: string }
          description: One FEEL expression per output column.
        annotations:
          type: array
          items: { type: string }
    TableEdit:
      type: object
      description: New rules for a decision table; columns and hit policy are preserved unless replaceColumns is set.
      required: [rules]
      properties:
        hitPolicy: { type: string }
        aggregation: { type: string }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/TableInput" }
        outputs:
          type: array
          items: { $ref: "#/components/schemas/TableOutput" }
        rules:
          type: array
          items: { $ref: "#/components/schemas/TableRule" }
        replaceColumns:
          type: boolean
          description: When true, the supplied inputs/outputs replace the table's columns instead of keeping them.
    LiteralView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        text: { type: string, description: The FEEL expression. }
        typeRef: { type: string, description: The decision's output type, if declared. }
    SaveLiteralRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, description: The FEEL expression to set as the decision's logic. }
        typeRef: { type: string, description: Optional output type for the decision's variable. }
    ContextEntryView:
      type: object
      properties:
        name: { type: string, description: "Entry name; empty for the result cell." }
        text: { type: string, description: "The FEEL expression when the entry's value is a literal." }
        typeRef: { type: string, description: The entry's declared type, if any. }
        kind: { type: string, description: "The value's boxed kind: \"literal\" or a nested kind shown read-only." }
        result: { type: boolean, description: "True for the final unnamed result cell." }
    ContextView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ContextEntryView" }
        simple: { type: boolean, description: "False when an entry is a nested non-literal expression, so the editor opens read-only." }
    ContextEdit:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          description: "The ordered context entries; one with an empty name is the result cell and must be last."
          items:
            type: object
            required: [name, text]
            properties:
              name: { type: string, description: "Entry name; empty for the result cell." }
              text: { type: string, description: The entry's FEEL expression. }
              typeRef: { type: string, description: Optional declared type for the entry. }
    BKMView:
      type: object
      properties:
        bkmId: { type: string }
        name: { type: string }
        params:
          type: array
          items: { $ref: "#/components/schemas/BKMParam" }
        bodyText: { type: string, description: The BKM's encapsulated-logic FEEL expression. }
        bodyTypeRef: { type: string }
        simple: { type: boolean, description: True when the body is a single literal expression (editable here). }
    BKMParam:
      type: object
      properties:
        name: { type: string }
        typeRef: { type: string }
    BKMFunctionEdit:
      type: object
      properties:
        params:
          type: array
          items: { $ref: "#/components/schemas/BKMParam" }
        bodyText: { type: string }
        bodyTypeRef: { type: string }
    SaveModelRequest:
      type: object
      description: Per-node edits (position, name, type) to patch into the model's XML.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/NodeEdit" }
    NodeEdit:
      type: object
      description: An edit to one node; only the fields present are changed.
      required: [id]
      properties:
        id: { type: string }
        name: { type: string }
        dataType: { type: string }
        x: { type: number }
        y: { type: number }
