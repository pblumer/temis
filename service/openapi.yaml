openapi: 3.0.3
info:
  title: Temis DMN Engine API
  version: "1.0-experimental"
  description: >
    HTTP interface to the Temis DMN 1.5 decision engine. Upload a DMN XML model,
    then evaluate one of its decisions against a JSON input context. A stateless
    endpoint compiles and evaluates in a single request. The surface is
    experimental until the v1 stabilisation (roadmap WP-43).


    Authentication (ADR-0028): when the server is configured with scoped API keys
    (`temisd -keys-file …` / `$TEMIS_KEYS_FILE`, or a bootstrap admin key), the
    `/v1` endpoints require an `Authorization: Bearer <kid>.<secret>` header. Each
    route needs a scope — `evaluate`, `models:read`, `models:write`, `git`,
    `assist`, `flow` or `admin` (a super-scope). A missing/invalid/expired/revoked
    key is `401`; a valid key lacking the route's scope is `403 FORBIDDEN`. The
    deprecated single token (`temisd -token` / `TEMIS_API_TOKEN`) still works as a
    legacy admin key that satisfies every scope. When neither keys nor a legacy
    token are configured the API is open and the header is ignored. Click
    **Authorize** and paste your `kid.secret` (or legacy token) to try the
    endpoints here.
servers:
  - url: /
# Bearer auth is optional: when the server runs without keys or a legacy token the
# empty requirement ({}) makes every endpoint callable; when auth is configured,
# callers present a kid.secret key (or the legacy token) via the bearerAuth scheme.
# Per-route scope requirements (ADR-0028 §2) are described in each operation's
# summary and the info block; OpenAPI's http-bearer scheme carries no scope list,
# so the scope→route mapping is documented in docs/40-api-contract.md.
security:
  - bearerAuth: []
  - {}
paths:
  /v1/models:
    post:
      summary: Compile and cache a DMN model
      description: >
        The request body is the raw DMN XML document. The response carries the
        content-addressed model id, the model index and any compile diagnostics.
        Re-uploading the same document returns the same id.
      requestBody:
        required: true
        content:
          application/xml:
            schema: { type: string }
      responses:
        "201":
          description: Model compiled and cached
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelResponse" }
        "400":
          description: Empty body or malformed XML
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List cached models
      description: >
        Returns a summary (id, decisions, inputs) of every model currently held
        in the in-memory cache. This endpoint can be disabled at startup
        (`temisd -list-models=false`) to keep the cached decisions private; when
        disabled it responds 404 as if it did not exist.
      responses:
        "200":
          description: The cached models
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Model listing is disabled
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}:
    get:
      summary: Get a cached model's index
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Model index
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    delete:
      summary: Remove a cached model
      description: Drops one cached revision from the model cache. The modeler deletes a whole named model by calling this once per revision.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Model removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/rename:
    post:
      summary: Rename a cached model
      description: >-
        Sets the model's display name (the DMN definitions name) and caches the
        recompiled document under its new content hash, returning the saved
        model's id so the client can switch to it. The original revision stays
        cached.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RenameModelRequest" }
      responses:
        "201":
          description: The renamed model's index
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelResponse" }
        "400":
          description: Invalid request body or empty name
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/xml:
    get:
      summary: Get a cached model's raw DMN XML
      description: Returns the DMN document exactly as uploaded, so a client can reopen it in an editor.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The model's DMN XML
          content:
            application/xml:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No model with that id
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/evaluate:
    post:
      summary: Evaluate a decision of a cached model
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateModelRequest" }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "400":
          description: Invalid request body or missing decision
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown model or decision
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Evaluation failed (e.g. UNIQUE table with multiple matches)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/evaluate-graph:
    post:
      summary: Evaluate the whole model and return every decision's result
      description: >-
        Fills the model's leaf inputs once and evaluates every executable
        decision, returning each one's value (and trace with explain) — the whole
        decision requirements graph computed from a single set of inputs. With
        strict, inputs are validated against the model's whole-graph schema, so a
        transitively-reached input is accepted while an unknown one is reported.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateGraphRequest" }
      responses:
        "200":
          description: Per-decision results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateGraphResponse" }
        "400":
          description: Invalid request body
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown model
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: Input does not satisfy the model's schema, or evaluation failed
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/evaluate-graph-batch:
    post:
      summary: Evaluate many input rows against one model in a single request
      description: >-
        The throughput path behind the modeler's Import cockpit: evaluate a whole
        batch of input rows against one model in one round-trip. Each row is
        evaluated independently and the response aligns 1:1 with the request's
        inputs — a strict-input rejection or a runtime failure is recorded as that
        row's problem and never aborts the batch. Traces are omitted by design
        (use evaluate-graph for a single explained run); this keeps the payload
        small so thousands of rows return quickly.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateGraphBatchRequest" }
      responses:
        "200":
          description: Per-row results, aligned 1:1 with the request's inputs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateGraphBatchResponse" }
        "400":
          description: Invalid request body, or too many inputs in the batch
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown model
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  # --- Modeler endpoints (ADR-0016) ---
  # These back the server's built-in DMN modeler (served at /). They read a
  # model's structure and per-decision logic, and edit it: every mutating call
  # recompiles the patched DMN XML and returns the saved model (201,
  # ModelResponse) under its new content-addressed id, so the client switches to
  # the persisted revision. They live on the same token-gated /v1 surface as the
  # core API.
  /v1/models/{id}/graph:
    get:
      summary: Get a model's decision requirements graph
      description: Nodes and requirement edges, so a client can draw the DRG without parsing DMN XML.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The decision requirements graph
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Graph" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Reconcile a model to a desired graph
      description: >
        Persists added/removed/moved/renamed/retyped nodes and edges, then
        recompiles. Surviving decisions keep their logic; new decisions are
        created undecided.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GraphEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/types:
    get:
      summary: List a model's named item definitions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The model's item definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items: { $ref: "#/components/schemas/ItemType" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Create or update a simple item definition
      description: Recompiles and returns the saved model. A structured (component) type or empty name is a 400.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ItemType" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/types/{name}:
    delete:
      summary: Remove a named item definition
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No model with that id, or no type with that name
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/models/{id}/decisions/{decision}/table:
    get:
      summary: Get a decision's decision-table view
      description: Hit policy, columns and rule rows. 404 when the decision has no decision-table logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The decision table
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TableView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Rewrite a decision's decision-table rules
      description: Columns and hit policy are preserved unless replaceColumns is set. Recompiles and returns the saved model.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TableEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-table:
    post:
      summary: Give an undecided decision a fresh decision table
      description: Columns are derived from the decision's requirements. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/literal:
    get:
      summary: Get a decision's literal-expression view
      description: 404 when the decision's logic is not a literal expression.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The literal expression
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiteralView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's literal-expression logic
      description: Creates or replaces the decision's literal FEEL expression. Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveLiteralRequest" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/context:
    get:
      summary: Get a decision's boxed-context view
      description: 404 when the decision's logic is not a boxed context. simple=false when an entry is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContextView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-context logic
      description: Replaces the decision's context entries (each a literal FEEL expression) and optional result cell. Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContextEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-context:
    post:
      summary: Give an undecided decision a fresh boxed context
      description: Creates a context with a single named entry. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/conditional:
    get:
      summary: Get a decision's boxed-conditional view
      description: 404 when the decision's logic is not a boxed conditional. simple=false when a branch is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed conditional
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConditionalView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-conditional logic
      description: Replaces the decision's if/then/else branches (each a literal FEEL expression). Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConditionalEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-conditional:
    post:
      summary: Give an undecided decision a fresh boxed conditional
      description: Creates an if/then/else with placeholder branches. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/list:
    get:
      summary: Get a decision's boxed-list view
      description: 404 when the decision's logic is not a boxed list. simple=false when an item is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-list logic
      description: Replaces the decision's list items (each a literal FEEL expression). Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ListEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-list:
    post:
      summary: Give an undecided decision a fresh boxed list
      description: Creates a list with a single placeholder item. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/relation:
    get:
      summary: Get a decision's boxed-relation view
      description: 404 when the decision's logic is not a boxed relation. simple=false when a cell is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed relation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RelationView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-relation logic
      description: Replaces the decision's columns and rows (each cell a literal FEEL expression). Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RelationEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-relation:
    post:
      summary: Give an undecided decision a fresh boxed relation
      description: Creates a relation with one column and one placeholder cell. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/filter:
    get:
      summary: Get a decision's boxed-filter view
      description: 404 when the decision's logic is not a boxed filter. simple=false when a branch is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed filter
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FilterView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-filter logic
      description: Replaces the decision's in/match branches (each a literal FEEL expression). Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FilterEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-filter:
    post:
      summary: Give an undecided decision a fresh boxed filter
      description: Creates a filter with placeholder in/match branches. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/iterator:
    get:
      summary: Get a decision's boxed-iteration view (for/some/every)
      description: 404 when the decision's logic is not a for/some/every iteration. simple=false when a branch is a nested boxed expression (the editor opens read-only).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The boxed iteration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IteratorView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a decision's boxed-iteration logic
      description: Replaces the decision's iteration (kind, iterator variable, collection and return/satisfies body, each a literal FEEL expression). Recompiles and returns the saved model with any compile diagnostics.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IteratorEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/decisions/{decision}/create-iterator:
    post:
      summary: Give an undecided decision a fresh boxed iteration
      description: Creates a placeholder `for` iteration. 400 when the decision already has logic.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: decision, in: path, required: true, schema: { type: string } }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/bkm/{bkm}:
    get:
      summary: Get a business knowledge model's encapsulated-logic view
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: bkm, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The BKM's function (parameters + body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BKMView" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
    post:
      summary: Set a business knowledge model's function
      description: Sets the BKM's parameters and literal body, recompiles and returns the saved model.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: bkm, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BKMFunctionEdit" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/models/{id}/save:
    post:
      summary: Apply modeler edits (positions, names, types) to a model
      description: >
        Patches the cached model's XML with per-node edits, recompiles and
        returns the saved model. All decision logic and the untouched DMNDI are
        preserved.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveModelRequest" }
      responses:
        "201": { $ref: "#/components/responses/ModelSaved" }
        "400": { $ref: "#/components/responses/BadModelEdit" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/ModelNotFound" }
  /v1/evaluate:
    post:
      summary: Stateless compile-and-evaluate in one request
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateStatelessRequest" }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "400":
          description: Missing xml/decision or malformed input
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/flows:
    post:
      summary: Register a decision-flow descriptor (WP-91, ADR-0026)
      description: >-
        Stores a JSON flow descriptor (the raw request body) and returns its
        content-addressed flowId. Diagnostics from validating the flow against
        the currently loaded models are returned; an unresolved model is reported
        but does not block registration (it may be loaded before evaluation).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlowDescriptor" }
      responses:
        "201":
          description: The registered flow's id, name and validation diagnostics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowResponse" }
        "400":
          description: Malformed flow descriptor
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: List the registered decision flows (WP-96)
      description: >-
        Returns a summary (flowId, name, declared input names, step count) of
        every flow currently registered in memory — the catalog a UI lists.
      responses:
        "200":
          description: The registered flows
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowListResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/flows/{id}:
    get:
      summary: Get a registered flow's steps, inputs and output wiring (WP-96)
      description: >-
        Returns the flow's declared inputs, its steps (id, model, decision,
        input wiring) and output mapping, plus fresh validation diagnostics
        against the loaded models — the data a UI draws as a graph.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The flow's drawing data
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FlowDetail" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown flow
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/flows/{id}/evaluate:
    post:
      summary: Evaluate a registered decision flow
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateFlowRequest" }
      responses:
        "200":
          description: Flow evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown flow
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "422":
          description: The flow is not valid or could not be evaluated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/flow/evaluate:
    post:
      summary: Stateless evaluate an inline decision flow
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateFlowStatelessRequest" }
      responses:
        "200":
          description: Flow evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateResponse" }
        "400":
          description: Missing or malformed flow
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: The flow is not valid or could not be evaluated
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/chat:
    post:
      summary: Modeling assistant — one assistant turn (ADR-0024)
      description: >
        Sends the conversation so far to the configured LLM, which may drive
        temis's tools (inspect, evaluate, build decisions) before answering. The
        endpoint is dormant (503 ASSIST_DISABLED) unless the server was started
        with the assistant enabled. With bring-your-own-key allowed, a caller may
        send its own provider key in the X-LLM-Token header.
      parameters:
        - in: header
          name: X-LLM-Token
          required: false
          schema: { type: string }
          description: Optional per-request provider API key (when BYOK is allowed).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: The assistant's reply, the tool steps it took and any model it produced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
        "400":
          description: Missing messages, no token, or unknown provider
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: The LLM provider returned an error
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "503":
          description: The assistant is not enabled on this server
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/status:
    get:
      summary: Operational status of the connected Umsysteme (ADR-0030)
      description: >
        Read-only view of the engine's load and the state of the systems temis
        talks to — the clio audit sink, the LLM assistant provider and git. Shows
        counters, last-success/last-error and reachability, but never a secret
        (no API key or token appears in the body). Gated by the same optional /v1
        token as the other data routes.
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatusResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/keys:
    post:
      summary: Create a scoped API key (ADR-0028 Phase 2, WP-103)
      description: >
        Mint a new managed kid.secret key with the requested scopes. The plaintext
        secret is returned exactly once in this response (as `secret` and the
        ready-to-use `bearer` = `kid.secret`) and never again — only its SHA-256 is
        stored. Requires the `admin` scope. Answers 404 when the persistent key
        store is not enabled (`temisd -keys-dir`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKeyRequest" }
      responses:
        "201":
          description: The created key with its one-time secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatedKey" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Key management is disabled (no key store configured)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
    get:
      summary: List API keys without secrets (WP-103)
      description: >
        List every key — managed and operator-owned — with its scopes, owner,
        expiry, revoked and managed flags, never any secret material. Requires the
        `admin` scope.
      responses:
        "200":
          description: The keys, sorted by kid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KeyList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Key management is disabled (no key store configured)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/keys/{kid}/rotate:
    post:
      summary: Rotate a managed key's secret (WP-103)
      description: >
        Issue a fresh secret for a managed key, invalidating the old one. The new
        secret is returned once (as with create). Requires the `admin` scope. A
        static/operator key cannot be rotated (409); an unknown kid is 404.
      parameters:
        - { name: kid, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The rotated key with its new one-time secret
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatedKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No such key (or key management disabled)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: The key is not server-managed (created outside the lifecycle API)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /v1/keys/{kid}/revoke:
    post:
      summary: Revoke a managed key (WP-103)
      description: >
        Mark a managed key revoked so it never authenticates again. Revocation
        marks rather than deletes, so the kid stays a stable audit handle.
        Requires the `admin` scope. A static/operator key cannot be revoked (409);
        an unknown kid is 404.
      parameters:
        - { name: kid, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The key was revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  kid: { type: string }
                  revoked: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No such key (or key management disabled)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
        "409":
          description: The key is not server-managed (created outside the lifecycle API)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }
  /docs:
    get:
      summary: Interactive Swagger UI
      description: Browser page for trying the API; loads the spec from /openapi.yaml.
      security: []
      responses:
        "200": { description: HTML page }
  /openapi.yaml:
    get:
      summary: This OpenAPI document
      security: []
      responses:
        "200": { description: OpenAPI 3 document (YAML) }
  /healthz:
    get:
      summary: Liveness probe
      responses:
        "200": { description: OK }
  /readyz:
    get:
      summary: Readiness probe
      description: >
        Reports real readiness (ADR-0030): 200 when the server can serve, 503
        with the failing checks when a hard start condition is unmet. A
        best-effort clio hiccup does not fail readiness; a fail-closed (strict)
        clio does.
      responses:
        "200": { description: Ready }
        "503":
          description: Not ready — one or more hard start conditions are unmet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadyResponse" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        A scoped `kid.secret` API key (ADR-0028), sent as
        `Authorization: Bearer <kid>.<secret>`. The keystore holds only the
        SHA-256 of each secret; each route requires a scope (evaluate ·
        models:read · models:write · git · assist · flow · admin). The deprecated
        single token (`temisd -token` / `TEMIS_API_TOKEN`) is also accepted as a
        legacy admin key. Only enforced when the server is configured with keys or
        a legacy token.
  responses:
    Unauthorized:
      description: Missing or invalid bearer token (only when the server requires one)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    Forbidden:
      description: The key is valid but lacks the scope this route requires (code FORBIDDEN)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    BadRequest:
      description: Invalid request body
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ModelNotFound:
      description: No model with that id
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    BadModelEdit:
      description: Invalid request body, or the edit could not be applied
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ModelSaved:
      description: >
        Edit applied: the patched model was recompiled and cached under a new
        content-addressed id. The body is the saved model's index (with any
        compile diagnostics), so the client can switch to the persisted revision.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ModelResponse" }
  schemas:
    CreateKeyRequest:
      type: object
      required: [scopes]
      properties:
        scopes:
          type: array
          items: { type: string, enum: [evaluate, "models:read", "models:write", git, assist, flow, admin, audit] }
          description: The scopes to grant the new key (ADR-0028 §2).
        owner:
          type: string
          description: Free-form owner label, for identity/audit. Optional.
        expiresAt:
          type: string
          format: date-time
          description: RFC3339 expiry; omit for a key that never expires.
    CreatedKey:
      type: object
      description: >
        A newly created or rotated key. The secret is shown once here and never
        again — only its SHA-256 is stored server-side.
      required: [kid, secret, bearer]
      properties:
        kid: { type: string, description: The public key id. }
        secret: { type: string, description: The one-time plaintext secret. }
        bearer: { type: string, description: "Ready-to-use credential: <kid>.<secret>." }
        scopes:
          type: array
          items: { type: string }
        owner: { type: string }
        expiresAt: { type: string, format: date-time }
    KeyView:
      type: object
      description: A key without any secret material.
      required: [kid, scopes, revoked, managed]
      properties:
        kid: { type: string }
        scopes:
          type: array
          items: { type: string }
        owner: { type: string }
        expiresAt: { type: string, format: date-time }
        revoked: { type: boolean }
        managed:
          type: boolean
          description: True for keys created via this API (rotatable/revocable); false for static/operator keys.
    KeyList:
      type: object
      required: [keys, count]
      properties:
        keys:
          type: array
          items: { $ref: "#/components/schemas/KeyView" }
        count: { type: integer }
    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          description: The conversation so far, oldest first.
          items:
            type: object
            required: [role, text]
            properties:
              role: { type: string, enum: [user, assistant] }
              text: { type: string }
        provider:
          type: string
          enum: [anthropic, openai]
          description: Override the server's default LLM provider for this request.
        model:
          type: string
          description: Override the provider's default model id for this request.
    ChatResponse:
      type: object
      properties:
        reply: { type: string, description: The assistant's final answer. }
        provider: { type: string, description: The provider that produced the reply. }
        modelId:
          type: string
          description: The id of a model the assistant created or changed, if any.
        steps:
          type: array
          description: The tool calls the assistant made on the way to its answer.
          items:
            type: object
            properties:
              tool: { type: string }
              args: { type: object }
              result: { type: string }
              error: { type: boolean }
    ModelListResponse:
      type: object
      properties:
        models:
          type: array
          items: { $ref: "#/components/schemas/ModelSummary" }
        count: { type: integer }
    ModelSummary:
      type: object
      properties:
        modelId: { type: string, example: "sha256:..." }
        name: { type: string, description: The DMN definitions' name, if any. }
        decisions:
          type: array
          items: { type: string }
        inputs:
          type: array
          items: { type: string }
        seq:
          type: integer
          description: Creation order (higher = newer), so same-named revisions can be shown newest-first as a history.
    ModelResponse:
      type: object
      properties:
        modelId: { type: string, example: "sha256:..." }
        name: { type: string, description: The DMN definitions' name, if any. }
        decisions:
          type: array
          items: { type: string }
        inputs:
          type: array
          items: { type: string }
        schema:
          type: object
          description: Per-decision typed input schema (decision name → input fields).
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/InputField" }
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
    InputField:
      type: object
      properties:
        name: { type: string }
        type: { type: string, description: "Canonical FEEL type, or empty if undeclared." }
        required: { type: boolean }
        constraint: { type: string, description: "Allowed-values text (a FEEL unary-test list), if any." }
        values:
          type: array
          items: { type: string }
          description: "Discrete values to offer for this input — from a declared enumeration and/or the literals used in decision-table cells."
        valuesClosed:
          type: boolean
          description: "True when values is the exhaustive allowed set (a closed dropdown); false when they are suggestions and other values are accepted."
    EvaluateModelRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string }
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
          description: When true, the response also carries a decision trace.
        strict:
          type: boolean
          description: When true, validate input against the typed schema; 422 INVALID_INPUT on violation.
    EvaluateStatelessRequest:
      type: object
      required: [xml, decision]
      properties:
        xml: { type: string }
        decision: { type: string }
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
          description: When true, the response also carries a decision trace.
        strict:
          type: boolean
          description: When true, validate input against the typed schema; 422 INVALID_INPUT on violation.
    EvaluateResponse:
      type: object
      properties:
        outputs:
          type: object
          additionalProperties: true
        decisions:
          type: object
          additionalProperties: true
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
        trace:
          $ref: "#/components/schemas/Trace"
    FlowDescriptor:
      type: object
      description: A decision-flow descriptor (ADR-0026); composes several models into one stateless evaluation.
      required: [steps]
      properties:
        flow: { type: string }
        version: { type: string }
        inputs:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              type: { type: string }
        steps:
          type: array
          items:
            type: object
            required: [id, model, decision]
            properties:
              id: { type: string }
              model: { type: string, description: The content-addressed modelId to resolve. }
              decision: { type: string, description: The decision or decision-service name/id. }
              in:
                type: object
                additionalProperties: { type: string }
                description: Input name → reference (a flow input or "stepID.output").
        output:
          type: object
          additionalProperties: { type: string }
    FlowResponse:
      type: object
      properties:
        flowId: { type: string }
        name: { type: string }
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/FlowDiagnostic" }
    FlowListResponse:
      type: object
      properties:
        flows:
          type: array
          items: { $ref: "#/components/schemas/FlowSummary" }
        count: { type: integer }
    FlowSummary:
      type: object
      properties:
        flowId: { type: string }
        name: { type: string }
        inputs:
          type: array
          items: { type: string }
          description: The declared flow-input names.
        steps: { type: integer, description: Number of steps. }
    FlowDetail:
      type: object
      description: A flow's steps, inputs and output wiring — the graph a UI draws.
      properties:
        flowId: { type: string }
        name: { type: string }
        version: { type: string }
        inputs:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              type: { type: string }
        steps:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              model: { type: string }
              decision: { type: string }
              in:
                type: object
                additionalProperties: { type: string }
        output:
          type: object
          additionalProperties: { type: string }
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/FlowDiagnostic" }
    FlowDiagnostic:
      type: object
      properties:
        code: { type: string, description: Stable FLOW_* class. }
        message: { type: string }
        step: { type: string }
    EvaluateFlowRequest:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
          description: When true, the response carries the aggregated decision trace.
    EvaluateFlowStatelessRequest:
      type: object
      required: [flow]
      properties:
        flow: { $ref: "#/components/schemas/FlowDescriptor" }
        input:
          type: object
          additionalProperties: true
        explain:
          type: boolean
    EvaluateGraphRequest:
      type: object
      properties:
        input:
          type: object
          additionalProperties: true
          description: The model's leaf inputs, filled once for the whole graph.
        explain:
          type: boolean
          description: When true, each decision in the response carries its trace.
        strict:
          type: boolean
          description: When true, validate input against the model's whole-graph schema; 422 INVALID_INPUT on violation.
    EvaluateGraphResponse:
      type: object
      properties:
        values:
          type: object
          additionalProperties: true
          description: Each decision's evaluated value, keyed by decision name.
        traces:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Trace" }
          description: Each decision's trace (with explain), keyed by name.
        errors:
          type: object
          additionalProperties: { type: string }
          description: Message for each decision that failed to evaluate, keyed by name.
        inputSchema:
          type: array
          items: { $ref: "#/components/schemas/InputField" }
          description: The leaf inputs the whole graph consumes.
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
    EvaluateGraphBatchRequest:
      type: object
      description: >-
        A plain run supplies `inputs`. A PRODUCTIVE run supplies `cases` (which
        also carry an entity + expectations) and sets `record: true`, so each
        evaluated case is written to clio as a quality event on its entity.
      properties:
        inputs:
          type: array
          description: One input row per test case (at most 100000 per request). Ignored when `cases` is present.
          items:
            type: object
            additionalProperties: true
        cases:
          type: array
          description: Richer rows (entity + expectations); used for a productive run.
          items: { $ref: "#/components/schemas/BatchCase" }
        strict:
          type: boolean
          description: When true, validate each row against the model's whole-graph schema.
        record:
          type: boolean
          description: When true, write one clio quality event per evaluated case (productive run); needs a configured clio quality queue, else 409 CLIO_NOT_CONFIGURED.
        subjectKey:
          type: string
          description: Input field whose value is the entity when a case gives no explicit `entity`.
    BatchCase:
      type: object
      properties:
        name: { type: string, description: "Optional case label." }
        entity: { type: string, description: "Entity the quality event is filed on (its clio subject)." }
        input:
          type: object
          additionalProperties: true
          description: The model's leaf inputs for this case.
        expect:
          type: object
          additionalProperties: true
          description: Expected decision values; sets the violation flag when they differ.
    EvaluateGraphBatchResponse:
      type: object
      properties:
        results:
          type: array
          description: Per-row results, aligned 1:1 with the request's inputs.
          items: { $ref: "#/components/schemas/GraphCaseResult" }
        inputSchema:
          type: array
          items: { $ref: "#/components/schemas/InputField" }
          description: The leaf inputs the whole graph consumes (shared by every row).
        recorded:
          type: integer
          description: How many quality events were queued to clio (0 for a test run).
    GraphCaseResult:
      type: object
      description: >
        One row's outcome: values+errors when it evaluated, or a problem when the
        row was rejected (strict input) or failed at runtime. Traces are omitted.
      properties:
        values:
          type: object
          additionalProperties: true
          description: Each decision's evaluated value, keyed by decision name.
        errors:
          type: object
          additionalProperties: { type: string }
          description: Message for each decision that failed to evaluate, keyed by name.
        problem:
          $ref: "#/components/schemas/CaseProblem"
    CaseProblem:
      type: object
      description: A per-row failure (INVALID_INPUT or EVALUATION_FAILED).
      properties:
        code: { type: string, enum: [INVALID_INPUT, EVALUATION_FAILED] }
        message: { type: string }
        problems:
          type: array
          items: { $ref: "#/components/schemas/InputProblem" }
    Trace:
      type: object
      description: >
        Structured explanation of the evaluation, present only when the request
        set explain=true. Derived from the actual evaluation (ADR-0013/WP-51).
      properties:
        tables:
          type: array
          items: { $ref: "#/components/schemas/TableTrace" }
    TableTrace:
      type: object
      properties:
        hitPolicy: { type: string, description: "U/A/F/R/C" }
        aggregation: { type: string, description: "SUM/MIN/MAX/COUNT or empty" }
        matched:
          type: array
          items: { type: integer }
          description: 0-based indices of the rules that matched.
        inputs:
          type: array
          items:
            type: object
            properties:
              expression: { type: string }
              value: {}
        rules:
          type: array
          items:
            type: object
            properties:
              index: { type: integer }
              id: { type: string }
              matched: { type: boolean }
              outputs:
                type: array
                items: {}
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    input: { type: string }
                    entry: { type: string }
                    matched: { type: boolean }
    Diagnostic:
      type: object
      properties:
        severity: { type: string, enum: [error, warning, info] }
        code: { type: string }
        message: { type: string }
        decisionId: { type: string }
        line: { type: integer }
        col: { type: integer }
    Problem:
      description: RFC-7807 problem detail with a stable engine-specific code.
      type: object
      properties:
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        code: { type: string }
        problems:
          type: array
          description: Structured input-validation failures (code INVALID_INPUT).
          items: { $ref: "#/components/schemas/InputProblem" }
    InputProblem:
      type: object
      properties:
        input: { type: string }
        code: { type: string, enum: [TYPE_MISMATCH, UNKNOWN_INPUT, MISSING_INPUT] }
        message: { type: string }
        expected: { type: string }
        got: { type: string }
    # --- Modeler schemas (ADR-0016) ---
    Graph:
      type: object
      description: A model's decision requirements graph — nodes and requirement edges.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphEdge" }
    GraphNode:
      type: object
      properties:
        id: { type: string }
        type: { type: string, description: "Node kind: decision, inputData, businessKnowledgeModel, decisionService, knowledgeSource." }
        name: { type: string }
        dataType: { type: string, description: "Resolved FEEL type (InputData type or a decision's output type); empty if unknown." }
        varName: { type: string, description: "A decision's output-variable name (how its result is referenced downstream)." }
        hasTable: { type: boolean, description: "Decision whose logic is a decision table." }
        hasLiteral: { type: boolean, description: "Decision whose logic is a literal FEEL expression." }
        hasContext: { type: boolean, description: "Decision whose logic is a boxed context." }
        hasConditional: { type: boolean, description: "Decision whose logic is a boxed conditional (if/then/else)." }
        hasList: { type: boolean, description: "Decision whose logic is a boxed list." }
        hasRelation: { type: boolean, description: "Decision whose logic is a boxed relation." }
        hasFilter: { type: boolean, description: "Decision whose logic is a boxed filter." }
        hasIterator: { type: boolean, description: "Decision whose logic is a boxed iteration (for/some/every)." }
        hasLogic: { type: boolean, description: "Decision that has any executable logic (table, literal or other boxed expression)." }
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
    GraphEdge:
      type: object
      properties:
        type: { type: string, description: "Edge kind, e.g. informationRequirement, knowledgeRequirement, authorityRequirement." }
        source: { type: string }
        target: { type: string }
    GraphEdit:
      type: object
      description: Desired decision requirements graph the model is reconciled to.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphNodeEdit" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphEdgeEdit" }
    GraphNodeEdit:
      type: object
      required: [id, type, name]
      properties:
        id: { type: string }
        type: { type: string }
        name: { type: string }
        dataType: { type: string }
        x: { type: number }
        y: { type: number }
        width: { type: number }
        height: { type: number }
    GraphEdgeEdit:
      type: object
      required: [type, source, target]
      properties:
        type: { type: string }
        source: { type: string }
        target: { type: string }
    ItemType:
      type: object
      description: A named item definition (a simple, non-structured FEEL type).
      required: [name]
      properties:
        name: { type: string }
        typeRef: { type: string, description: "Base FEEL type, e.g. string, number, boolean." }
        isCollection: { type: boolean }
        allowedValues: { type: string, description: "A FEEL unary-test list constraining the values." }
        structured: { type: boolean, description: "Read-only marker on GET; a structured (component) type cannot be saved via this endpoint." }
    TableView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        hitPolicy: { type: string, description: "U/A/P/F/R/C/O" }
        aggregation: { type: string, description: "SUM/MIN/MAX/COUNT or empty" }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/TableInput" }
        outputs:
          type: array
          items: { $ref: "#/components/schemas/TableOutput" }
        rules:
          type: array
          items: { $ref: "#/components/schemas/TableRule" }
    TableInput:
      type: object
      properties:
        label: { type: string }
        expression: { type: string }
        typeRef: { type: string }
    TableOutput:
      type: object
      properties:
        name: { type: string }
        label: { type: string }
        typeRef: { type: string }
    TableRule:
      type: object
      properties:
        inputEntries:
          type: array
          items: { type: string }
          description: One FEEL unary-test per input column.
        outputEntries:
          type: array
          items: { type: string }
          description: One FEEL expression per output column.
        annotations:
          type: array
          items: { type: string }
    TableEdit:
      type: object
      description: New rules for a decision table; columns and hit policy are preserved unless replaceColumns is set.
      required: [rules]
      properties:
        hitPolicy: { type: string }
        aggregation: { type: string }
        inputs:
          type: array
          items: { $ref: "#/components/schemas/TableInput" }
        outputs:
          type: array
          items: { $ref: "#/components/schemas/TableOutput" }
        rules:
          type: array
          items: { $ref: "#/components/schemas/TableRule" }
        replaceColumns:
          type: boolean
          description: When true, the supplied inputs/outputs replace the table's columns instead of keeping them.
    LiteralView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        text: { type: string, description: The FEEL expression. }
        typeRef: { type: string, description: The decision's output type, if declared. }
    SaveLiteralRequest:
      type: object
      required: [text]
      properties:
        text: { type: string, description: The FEEL expression to set as the decision's logic. }
        typeRef: { type: string, description: Optional output type for the decision's variable. }
    ContextEntryView:
      type: object
      properties:
        name: { type: string, description: The bound entry name. }
        text: { type: string, description: The entry's literal FEEL expression. }
        typeRef: { type: string, description: The entry variable's declared FEEL type, if any. }
    ContextView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/ContextEntryView" }
        result: { type: string, description: The result-cell expression (the context's value), if any. }
        resultTypeRef: { type: string, description: The result cell's declared type, if any. }
        simple: { type: boolean, description: False when an entry is a nested boxed expression this text view cannot edit. }
    ContextEdit:
      type: object
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/ContextEntryView" }
        result: { type: string, description: Optional result-cell expression. }
        resultTypeRef: { type: string, description: Optional result type. }
    ConditionalView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        if: { type: string, description: The condition (FEEL). }
        then: { type: string, description: The then branch (FEEL). }
        else: { type: string, description: The else branch (FEEL). }
        simple: { type: boolean, description: False when a branch is a nested boxed expression this text view cannot edit. }
    ConditionalEdit:
      type: object
      required: [if, then, else]
      properties:
        if: { type: string, description: The condition (FEEL). }
        then: { type: string, description: The then branch (FEEL). }
        else: { type: string, description: The else branch (FEEL). }
    ListView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        items: { type: array, items: { type: string }, description: The ordered FEEL item expressions. }
        simple: { type: boolean, description: False when an item is a nested boxed expression this text view cannot edit. }
    ListEdit:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { type: string }, description: The ordered FEEL items (blank items are dropped). }
    RelationView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        columns: { type: array, items: { type: string }, description: The column names. }
        rows: { type: array, items: { type: array, items: { type: string } }, description: The rows of FEEL cells, each aligned to the columns. }
        simple: { type: boolean, description: False when a cell is a nested boxed expression this text grid cannot edit. }
    RelationEdit:
      type: object
      required: [columns, rows]
      properties:
        columns: { type: array, items: { type: string }, description: The column names (non-empty and unique). }
        rows: { type: array, items: { type: array, items: { type: string } }, description: The rows of FEEL cells (fully blank rows are dropped; other rows need one cell per column). }
    FilterView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        in: { type: string, description: The collection to filter (FEEL). }
        match: { type: string, description: "The predicate, evaluated per element with `item` bound (FEEL)." }
        simple: { type: boolean, description: False when a branch is a nested boxed expression this text view cannot edit. }
    FilterEdit:
      type: object
      required: [in, match]
      properties:
        in: { type: string, description: The collection to filter (FEEL). }
        match: { type: string, description: The predicate (FEEL). }
    IteratorView:
      type: object
      properties:
        decisionId: { type: string }
        name: { type: string }
        kind: { type: string, enum: [for, some, every], description: "for yields a list (return); some/every yield a boolean (satisfies)." }
        variable: { type: string, description: The iterator variable, bound in the body. }
        in: { type: string, description: The collection iterated (FEEL). }
        body: { type: string, description: "The return (for) or satisfies (some/every) branch (FEEL)." }
        simple: { type: boolean, description: False when a branch is a nested boxed expression this text view cannot edit. }
    IteratorEdit:
      type: object
      required: [kind, variable, in, body]
      properties:
        kind: { type: string, enum: [for, some, every] }
        variable: { type: string, description: The iterator variable. }
        in: { type: string, description: The collection (FEEL). }
        body: { type: string, description: The return/satisfies branch (FEEL). }
    BKMView:
      type: object
      properties:
        bkmId: { type: string }
        name: { type: string }
        params:
          type: array
          items: { $ref: "#/components/schemas/BKMParam" }
        bodyText: { type: string, description: The BKM's encapsulated-logic FEEL expression. }
        bodyTypeRef: { type: string }
        simple: { type: boolean, description: True when the body is a single literal expression (editable here). }
    BKMParam:
      type: object
      properties:
        name: { type: string }
        typeRef: { type: string }
    BKMFunctionEdit:
      type: object
      properties:
        params:
          type: array
          items: { $ref: "#/components/schemas/BKMParam" }
        bodyText: { type: string }
        bodyTypeRef: { type: string }
    RenameModelRequest:
      type: object
      description: The model's new display name (the DMN definitions name).
      required: [name]
      properties:
        name: { type: string }
    SaveModelRequest:
      type: object
      description: Per-node edits (position, name, type) to patch into the model's XML.
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/NodeEdit" }
    NodeEdit:
      type: object
      description: An edit to one node; only the fields present are changed.
      required: [id]
      properties:
        id: { type: string }
        name: { type: string }
        dataType: { type: string }
        x: { type: number }
        y: { type: number }
    StatusResponse:
      type: object
      description: >
        Operational status (ADR-0030): the engine's load and the state of the
        connected Umsysteme. Secret-free — no API key or token ever appears.
      properties:
        engine:
          type: object
          properties:
            version: { type: string }
            uptime: { type: string, description: Human-readable uptime, e.g. "3h12m". }
            uptimeSeconds: { type: integer }
            models: { type: integer, description: Models currently in the cache. }
            cache:
              type: object
              properties:
                size: { type: integer }
                capacity: { type: integer, description: 0 means unbounded. }
                hits: { type: integer }
                misses: { type: integer }
                evictions: { type: integer }
        clio:
          type: object
          description: Audit sink state (ADR-0023). Never carries the clio token.
          properties:
            enabled: { type: boolean }
            mode: { type: string, enum: [best-effort, strict] }
            url: { type: string }
            writesOk: { type: integer }
            writesFailed: { type: integer }
            idempotentSkips: { type: integer }
            lastOk: { type: string, format: date-time }
            lastError: { type: string }
            lastErrorAt: { type: string, format: date-time }
            reachable: { type: boolean }
        llm:
          type: object
          description: Modeling-assistant provider state (ADR-0024). Never carries the provider key.
          properties:
            enabled: { type: boolean }
            provider: { type: string }
            byok: { type: boolean, description: Whether a caller may bring its own key (X-LLM-Token). }
            callsOk: { type: integer }
            callsFailed: { type: integer }
            lastOk: { type: string, format: date-time }
        git:
          type: object
          properties:
            available: { type: boolean }
    ReadyResponse:
      type: object
      description: Readiness result (ADR-0030). Checks lists the unmet hard start conditions.
      properties:
        status: { type: string, enum: [ready, "not ready"] }
        checks:
          type: array
          items: { type: string }
