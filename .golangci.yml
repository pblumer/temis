# golangci-lint configuration (v2 schema).
# Kept strict but green for the scaffold; tighten per package as code lands.
version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: package-comments
        - name: exported

formatters:
  enable:
    - gofmt
