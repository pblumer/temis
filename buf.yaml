version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # The service is named DmnEngine by the published contract
    # (docs/40-api-contract.md §3), not DmnEngineService.
    - SERVICE_SUFFIX
    # EvaluateBatch deliberately reuses EvaluateRequest/EvaluateResponse: a batch
    # is a stream of the same evaluations, so the message is identical.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
