<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Temis — jede Entscheidung ein Event für die Ewigkeit</title>
  <desc id="desc">Business-Events fließen von links in die Temis-Engine, werden zu einer nachvollziehbaren Entscheidung ausgewertet und landen rechts unveränderlich in einem hash-verketteten Audit-Ledger, das in die Unendlichkeit läuft.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080D1C"/>
      <stop offset="0.5" stop-color="#111E45"/>
      <stop offset="1" stop-color="#3B1470"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 250) rotate(38) scale(430 300)">
      <stop stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 420) rotate(140) scale(460 320)">
      <stop stop-color="#F472B6" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="engine" x1="440" y1="150" x2="840" y2="490" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="card" x1="380" y1="110" x2="900" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="chain" x1="980" y1="0" x2="1240" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <style>
      .label{font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#E9F7FF; font-weight:700; letter-spacing:.02em}
      .small{font-size:22px}.tiny{font-size:15px}.micro{font-size:12.5px; fill:#BFE9FF; font-weight:600}
      .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace; fill:#D9F99D; font-weight:700}
      .hash{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace; fill:#6EE7B7; font-weight:600; font-size:11px; letter-spacing:.04em}
      .flow{stroke:#7DD3FC; stroke-width:4; stroke-linecap:round; stroke-dasharray:10 14; opacity:.85}
      .spark{fill:#FDE68A}
    </style>
  </defs>

  <rect width="1280" height="640" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="34" fill="url(#glowA)"/>
  <rect width="1280" height="640" rx="34" fill="url(#glowB)"/>

  <g opacity="0.2">
    <path d="M60 116C214 58 318 118 470 70C620 22 781 55 938 90C1069 119 1167 84 1223 52" stroke="#93C5FD" stroke-width="2"/>
    <path d="M66 552C210 493 348 588 503 518C650 453 743 521 907 484C1050 452 1129 509 1222 444" stroke="#F0ABFC" stroke-width="2"/>
    <circle cx="94" cy="84" r="3" fill="#BAE6FD"/><circle cx="1002" cy="63" r="3" fill="#A7F3D0"/><circle cx="120" cy="486" r="4" fill="#F0ABFC"/>
  </g>

  <!-- event flow lines: left -> engine -->
  <path class="flow" d="M158 210 C262 158 322 180 416 242"/>
  <path class="flow" d="M151 324 C265 314 315 332 413 318"/>
  <path class="flow" d="M158 438 C258 502 330 453 418 390"/>

  <!-- events in -->
  <g filter="url(#shadow)" transform="translate(58 160)">
    <rect width="182" height="78" rx="20" fill="#0F172A" stroke="#38BDF8" stroke-width="2"/>
    <circle cx="36" cy="39" r="17" fill="#06B6D4"/><path d="M31 39h10M36 34v10" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="66" y="34" class="label tiny">Order Event</text><text x="66" y="55" class="micro">CloudEvent rein</text>
  </g>
  <g filter="url(#shadow)" transform="translate(52 288)">
    <rect width="190" height="78" rx="20" fill="#0F172A" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="38" cy="39" r="17" fill="#8B5CF6"/><path d="M30 40l7 7 12-18" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="34" class="label tiny">Customer Data</text><text x="70" y="55" class="micro">typisierter Input</text>
  </g>
  <g filter="url(#shadow)" transform="translate(61 415)">
    <rect width="180" height="78" rx="20" fill="#0F172A" stroke="#F472B6" stroke-width="2"/>
    <circle cx="36" cy="39" r="17" fill="#EC4899"/><path d="M27 39h18M36 30v18" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="66" y="34" class="label tiny">Risk Signal</text><text x="66" y="55" class="micro">Streaming-Fakt</text>
  </g>

  <!-- engine: scales of justice + DMN decision core -->
  <g filter="url(#shadow)">
    <rect x="360" y="98" width="540" height="436" rx="44" fill="url(#card)" stroke="white" stroke-opacity="0.22" stroke-width="2"/>
    <rect x="404" y="140" width="452" height="352" rx="34" fill="#07111F" stroke="url(#engine)" stroke-width="4"/>
    <circle cx="630" cy="320" r="118" fill="url(#engine)" opacity="0.16" filter="url(#soft)"/>

    <text x="630" y="182" text-anchor="middle" class="label small">TEMIS ENGINE</text>

    <!-- scales of justice (Themis) -->
    <g stroke="#7DD3FC" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.95">
      <path d="M630 226v150"/>
      <path d="M545 258h170"/>
      <path d="M545 258l-26 44M545 258l26 44M519 302a26 15 0 0 0 52 0"/>
      <path d="M715 258l-26 44M715 258l26 44M689 302a26 15 0 0 0 52 0"/>
      <path d="M600 384h60"/>
    </g>
    <circle cx="630" cy="226" r="7" fill="#FDE68A"/>

    <!-- decision diamond -->
    <path d="M630 300l34 44-34 44-34-44 34-44Z" fill="#111827" stroke="#F59E0B" stroke-width="4"/>
    <text x="630" y="349" text-anchor="middle" class="label" font-size="17" fill="#FDE68A">DMN</text>

    <text x="630" y="466" text-anchor="middle" class="mono" font-size="19">FEEL · 0.1 + 0.2 = 0.3</text>
  </g>

  <!-- engine -> decision flow -->
  <path class="flow" d="M904 250 C912 222 916 210 924 196"/>

  <!-- decision out -->
  <g filter="url(#shadow)" transform="translate(924 150)">
    <rect width="152" height="86" rx="22" fill="#052E2B" stroke="#34D399" stroke-width="2"/>
    <text x="76" y="35" text-anchor="middle" class="label tiny">Entscheidung</text>
    <text x="76" y="62" text-anchor="middle" class="label small" fill="#A7F3D0">APPROVE</text>
  </g>

  <!-- decision -> eternal ledger -->
  <path class="flow" d="M1000 236 C1010 252 1035 262 1062 272"/>

  <!-- eternal hash-linked ledger, receding toward infinity -->
  <text x="1090" y="258" text-anchor="middle" class="label tiny" fill="#A7F3D0">Audit-Ledger</text>

  <g filter="url(#shadow)">
    <rect x="1006" y="272" width="126" height="92" rx="16" fill="#0B2721" stroke="#34D399" stroke-width="2.5"/>
    <text x="1069" y="300" text-anchor="middle" class="label tiny" fill="#D1FAE5">Block #001</text>
    <text x="1069" y="322" text-anchor="middle" class="hash">sha256 9f2a…</text>
    <text x="1069" y="342" text-anchor="middle" class="hash" opacity="0.85">prev — Genesis</text>
  </g>
  <path d="M1132 318 H1150" stroke="#34D399" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.8"/>
  <g opacity="0.66">
    <rect x="1150" y="286" width="84" height="66" rx="13" fill="#0B2721" stroke="#34D399" stroke-width="2"/>
    <text x="1192" y="312" text-anchor="middle" class="label" font-size="12.5" fill="#D1FAE5">Block #002</text>
    <text x="1192" y="332" text-anchor="middle" class="hash">prev 9f2a…</text>
  </g>

  <!-- infinity mark = für die Ewigkeit -->
  <g transform="translate(1058 384)" opacity="0.95">
    <path d="M0 11c0-7 5-11 11-11s11 4 11 11-5 11-11 11-11-4-11-11ZM22 11c0-7 5-11 11-11s11 4 11 11-5 11-11 11-11-4-11-11Z" fill="none" stroke="#6EE7B7" stroke-width="3"/>
    <text x="52" y="16" class="label tiny" fill="#A7F3D0">unveränderlich</text>
  </g>

  <!-- sparks -->
  <g opacity="0.95">
    <path d="M300 100l10 22 24 3-18 16 5 24-21-12-21 12 5-24-18-16 24-3 10-22Z" class="spark"/>
    <path d="M918 118l7 15 17 2-12 11 3 17-15-8-15 8 3-17-12-11 17-2 7-15Z" class="spark"/>
  </g>

  <text x="72" y="588" class="label" font-size="30">Events rein</text>
  <text x="1208" y="588" text-anchor="end" class="label" font-size="30">für die Ewigkeit</text>
</svg>
