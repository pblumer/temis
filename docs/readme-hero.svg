<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Temis technical decision pipeline</title>
  <desc id="desc">A restrained technical diagram showing input data flowing through FEEL evaluation and a DMN decision to a result and optional trace.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.core{fill:#0f172a;stroke:#334155;stroke-width:2}.line{stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
      .title{font:700 54px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.claim{font:600 30px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334155}.label{font:700 24px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f172a}.small{font:500 18px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}.mono{font:500 18px "SFMono-Regular",Consolas,"Liberation Mono",monospace;fill:#334155}.coreText{font:700 30px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}.coreSmall{font:500 18px "SFMono-Regular",Consolas,"Liberation Mono",monospace;fill:#cbd5e1}.badge{fill:#eef2ff;stroke:#c7d2fe;stroke-width:1}.badgeText{font:600 16px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#3730a3}
    </style>
  </defs>
  <rect class="bg" width="1280" height="640" rx="28"/>
  <rect x="48" y="44" width="1184" height="552" rx="22" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="86" y="118" class="title">Temis</text>
  <text x="86" y="162" class="claim">DMN decisions. Native Go. No magic.</text>

  <g transform="translate(86 214)">
    <rect class="panel" width="245" height="190" rx="14"/>
    <text x="24" y="42" class="label">Input data</text>
    <text x="24" y="78" class="mono">{</text>
    <text x="44" y="108" class="mono">"amount": 12000,</text>
    <text x="44" y="138" class="mono">"riskScore": 42</text>
    <text x="24" y="168" class="mono">}</text>
  </g>

  <line class="line" x1="350" y1="309" x2="440" y2="309"/>

  <g transform="translate(460 214)">
    <rect class="panel" width="245" height="190" rx="14"/>
    <text x="24" y="42" class="label">FEEL</text>
    <text x="24" y="78" class="small">Expression evaluation</text>
    <line x1="24" y1="102" x2="221" y2="102" stroke="#e2e8f0"/>
    <text x="24" y="136" class="mono">riskScore &lt; 60</text>
    <text x="24" y="166" class="mono">amount &lt;= 15000</text>
  </g>

  <line class="line" x1="724" y1="309" x2="814" y2="309"/>

  <g transform="translate(834 194)">
    <rect class="core" width="250" height="230" rx="16"/>
    <text x="125" y="62" text-anchor="middle" class="coreText">DMN Decision</text>
    <text x="125" y="102" text-anchor="middle" class="coreSmall">decision table</text>
    <text x="125" y="132" text-anchor="middle" class="coreSmall">hit policy</text>
    <text x="125" y="162" text-anchor="middle" class="coreSmall">typed outputs</text>
  </g>

  <line class="line" x1="1085" y1="275" x2="1160" y2="245"/>
  <line class="line" x1="1085" y1="343" x2="1160" y2="373"/>

  <g transform="translate(1130 170)">
    <rect class="panel" width="110" height="116" rx="14"/>
    <text x="55" y="42" text-anchor="middle" class="label">Result</text>
    <text x="55" y="78" text-anchor="middle" class="mono">APPROVE</text>
  </g>
  <g transform="translate(1130 342)">
    <rect class="panel" width="110" height="116" rx="14"/>
    <text x="55" y="42" text-anchor="middle" class="label">Trace</text>
    <text x="55" y="76" text-anchor="middle" class="small">matched</text>
    <text x="55" y="100" text-anchor="middle" class="small">rules</text>
  </g>

  <g transform="translate(86 475)">
    <rect class="badge" width="88" height="34" rx="17"/><text x="44" y="23" text-anchor="middle" class="badgeText">DMN 1.5</text>
    <rect class="badge" x="104" width="70" height="34" rx="17"/><text x="139" y="23" text-anchor="middle" class="badgeText">FEEL</text>
    <rect class="badge" x="190" width="102" height="34" rx="17"/><text x="241" y="23" text-anchor="middle" class="badgeText">Go library</text>
    <rect class="badge" x="308" width="112" height="34" rx="17"/><text x="364" y="23" text-anchor="middle" class="badgeText">HTTP/gRPC</text>
    <rect class="badge" x="436" width="126" height="34" rx="17"/><text x="499" y="23" text-anchor="middle" class="badgeText">Decision traces</text>
  </g>

  <text x="86" y="550" class="small">Input data → FEEL evaluation → DMN decision → decision result → optional trace</text>
</svg>
